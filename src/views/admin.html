<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grading Admin Dashboard</title>
  <style>
    :root {
      --bg: #faf8f4;            /* soft tan page background */
      --panel: #ffffff;
      --panel-alt: #f5f2ec;
      --border: #e7e2d8;
      --text: #2b2a27;
      --muted: #8a8578;
      --accent: #4f46e5;        /* indigo, like the reference */
      --accent-soft: #eef0ff;
      --good: #15803d;
      --good-soft: #dcfce7;
      --bad: #b91c1c;
      --bad-soft: #fee2e2;
      --amber-soft: #fef3c7;
      --amber-text: #92400e;
      --bar: #6366f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px;
    }
    a { color: var(--accent); }

    /* Header */
    header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; justify-content: space-between; align-items: flex-start; }
    header h1 { margin: 0; font-size: 19px; }
    header .subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .link-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }
    .link-btn:hover { color: var(--accent); }

    /* Tabs */
    nav.tabs { background: var(--panel); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; gap: 26px; }
    nav.tabs button {
      background: none; border: none; padding: 14px 2px; font-size: 14px; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    nav.tabs button:hover { color: var(--text); }

    /* Controls row */
    .controls { background: var(--panel); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; gap: 12px; align-items: center; }
    select, input {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 10px; font-size: 14px;
    }
    button.btn { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; font-size: 14px; cursor: pointer; }
    button.btn:hover { border-color: var(--accent); color: var(--accent); }
    #status { color: var(--muted); font-size: 12px; margin-left: auto; }

    main { padding: 22px 28px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 22px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 15px 16px; }
    .card .label { color: var(--muted); font-size: 12px; }
    .card .value { font-size: 24px; font-weight: 700; margin-top: 6px; }
    .card .value.accent { color: var(--accent); }
    .card .sub { color: var(--muted); font-size: 12px; margin-top: 3px; }

    /* User tab split */
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
    @media (max-width: 900px) { .split { grid-template-columns: 1fr; } }
    .box { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; }
    .box-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .box-head h3 { margin: 0; font-size: 15px; }
    .box-head .hint { color: var(--muted); font-size: 12px; }

    /* User list */
    .user-list { max-height: 620px; overflow-y: auto; }
    .user-row { padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; gap: 10px; }
    .user-row:hover { background: var(--panel-alt); }
    .user-row.selected { background: var(--accent-soft); }
    .user-row .name-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .user-row .num { color: var(--muted); font-size: 12px; }
    .user-row .name { font-weight: 600; }
    .user-row .email { color: var(--muted); font-size: 12px; margin-top: 3px; word-break: break-all; }
    .user-row .meta { color: var(--muted); font-size: 12px; margin-top: 5px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .user-row .cost { font-weight: 700; white-space: nowrap; }

    .tag { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .tag.returning { background: var(--good-soft); color: var(--good); }
    .tag.new { background: var(--accent-soft); color: var(--accent); }
    .tag.campus { background: var(--amber-soft); color: var(--amber-text); }
    .tag.none { background: var(--panel-alt); color: var(--muted); }
    .tag.dev { background: #ede9fe; color: #6d28d9; }
    .tag.akdmic { background: #cffafe; color: #0e7490; }
    .dot { color: var(--border); }

    /* Detail panel */
    .detail-empty { padding: 60px 20px; text-align: center; color: var(--muted); }
    .detail-body { padding: 16px; }
    .detail-body h4 { margin: 0 0 4px; font-size: 16px; }
    .detail-sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; word-break: break-all; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
    .stat { background: var(--panel-alt); border-radius: 8px; padding: 12px; text-align: center; }
    .stat .n { font-size: 20px; font-weight: 700; }
    .stat .n.accent { color: var(--accent); }
    .stat .l { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .section-label { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 16px 0 8px; }
    .cycle { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .cycle .when { color: var(--text); }
    .cycle .n { color: var(--muted); }

    /* Charts / tables (other tabs) */
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 12px; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin: 5px 16px; }
    .bar-row .k { width: 60px; color: var(--muted); font-size: 12px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--panel-alt); border-radius: 4px; height: 16px; }
    .bar-fill { background: var(--bar); height: 100%; border-radius: 4px; min-width: 2px; }
    .bar-row .v { width: 150px; text-align: right; font-size: 12px; flex-shrink: 0; }
    .muted { color: var(--muted); }
    .err-msg { color: var(--bad); font-family: monospace; font-size: 12px; }
    .hidden { display: none; }

    /* Login */
    #login { max-width: 360px; margin: 90px auto; text-align: center; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 32px; }
    #login h2 { margin: 0 0 6px; }
    #login p { color: var(--muted); margin: 0 0 18px; }
    #login input { width: 100%; margin-bottom: 12px; text-align: center; }
    #login button { width: 100%; background: var(--accent); color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; }
    #loginError { color: var(--bad); min-height: 18px; margin-top: 8px; font-size: 13px; }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="login" class="hidden">
    <h2>Admin Access</h2>
    <p>Enter the admin secret to continue.</p>
    <input id="secret" type="password" placeholder="Admin secret" autocomplete="current-password" />
    <button id="loginBtn">Enter</button>
    <div id="loginError"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <header>
      <div>
        <h1>Grading Admin</h1>
        <div class="subtitle">Usage, cost &amp; reliability</div>
      </div>
      <button id="logout" class="link-btn">Log out</button>
    </header>

    <nav class="tabs">
      <button data-tab="users" class="active">Users</button>
      <button data-tab="activity">Activity &amp; cost</button>
      <button data-tab="reliability">Reliability</button>
    </nav>

    <div class="controls">
      <label class="muted">Date range:</label>
      <select id="range">
        <option value="7">Last 7 days</option>
        <option value="30" selected>Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="365">Last year</option>
      </select>
      <span class="muted" style="font-size:12px">applies to cost figures below</span>
      <button id="refresh" class="btn">Refresh</button>
      <span id="status"></span>
    </div>

    <main>
      <!-- USERS TAB -->
      <div class="tab-panel active" id="tab-users">
        <div class="cards" id="cards"></div>
        <div class="split">
          <div class="box">
            <div class="box-head">
              <h3>Users</h3>
              <span class="hint">Tap a user for details</span>
            </div>
            <div class="user-list" id="userList"><div class="detail-empty">Loading…</div></div>
          </div>
          <div class="box">
            <div class="box-head"><h3>User details</h3></div>
            <div id="userDetail"><div class="detail-empty">Select a user to view cost &amp; usage patterns.</div></div>
          </div>
        </div>
      </div>

      <!-- ACTIVITY TAB -->
      <div class="tab-panel" id="tab-activity">
        <div class="cards" id="cardsActivity"></div>
        <div class="box">
          <div class="box-head"><h3>Activity &amp; cost over time</h3></div>
          <div id="overTime" style="padding:12px 0"></div>
        </div>
        <div class="box" style="margin-top:16px">
          <div class="box-head"><h3>Cost by model</h3></div>
          <div id="modelsTable" style="padding:4px 0"></div>
        </div>
      </div>

      <!-- RELIABILITY TAB -->
      <div class="tab-panel" id="tab-reliability">
        <div class="cards" id="cardsReliability"></div>
        <div class="box">
          <div class="box-head"><h3>Recent errors</h3></div>
          <div id="errorsTable" style="padding:4px 0"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmtUsd = (n) => '$' + (Number(n) || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmtUsd4 = (n) => '$' + (Number(n) || 0).toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 });
    const fmtNum = (n) => (Number(n) || 0).toLocaleString();
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    const fmtDate = (d) => d ? new Date(d).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }) : '—';
    const fmtDateTime = (d) => d ? new Date(d).toLocaleString() : '—';
    const ago = (n) => n == null ? 'never' : n === 0 ? 'today' : n === 1 ? 'yesterday' : `${n}d ago`;
    // Display name derived from the email local-part (we don't store names).
    const nameFromEmail = (e) => {
      const local = (e || '').split('@')[0].replace(/[._]+/g, ' ');
      return local.replace(/\b\w/g, c => c.toUpperCase()) || '(unknown)';
    };
    // Build the badge set for a user (status, role, campus).
    // status: 'returning' → ↻ Returning; 'new' → New (≤6wk, not returned yet);
    // null → no engagement badge (past 6wk, never returned).
    const badges = (u) => {
      const out = [];
      if (u.status === 'returning') out.push('<span class="tag returning">↻ Returning</span>');
      else if (u.status === 'new') out.push('<span class="tag new">New</span>');
      if (u.role === 'dev') out.push('<span class="tag dev">Dev</span>');
      else if (u.role === 'akdmic') out.push('<span class="tag akdmic">akdmic</span>');
      out.push(u.campus ? `<span class="tag campus">${esc(u.campus)}</span>` : '<span class="tag none">no campus</span>');
      return out.join(' ');
    };

    let currentDays = 30;
    let selectedUserId = null;

    async function whoami() {
      const r = await fetch('/admin/api/whoami');
      if (r.status === 404) { document.body.innerHTML = '<main style="padding:40px">Admin dashboard is not configured.</main>'; return null; }
      return (await r.json()).authed;
    }
    function showLogin() { $('login').classList.remove('hidden'); $('dashboard').classList.add('hidden'); $('secret').focus(); }
    function showDashboard() { $('login').classList.add('hidden'); $('dashboard').classList.remove('hidden'); loadAll(); }

    async function doLogin() {
      $('loginError').textContent = '';
      const r = await fetch('/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ secret: $('secret').value }) });
      if (r.ok) showDashboard(); else $('loginError').textContent = 'Invalid secret.';
    }
    async function doLogout() { await fetch('/admin/logout', { method: 'POST' }); showLogin(); }

    function card(label, value, sub, accent) {
      return `<div class="card"><div class="label">${esc(label)}</div><div class="value${accent?' accent':''}">${value}</div>${sub?`<div class="sub">${esc(sub)}</div>`:''}</div>`;
    }

    // ---------- Summary (cards + activity + reliability tabs) ----------
    async function loadSummary() {
      const r = await fetch('/admin/api/summary?days=' + currentDays);
      if (r.status === 401) { showLogin(); return; }
      const d = await r.json();
      if (!d.success) return;
      const t = d.totals;

      const topCards = [
        card('Total cost', fmtUsd(t.cost), `${d.windowDays}-day window · excl. dev`),
        card('Dev costs', fmtUsd(t.devCost), `${fmtNum(t.devGrades)} dev grades · your account`),
        card('Essays graded', fmtNum(t.grades), `${fmtNum(t.tokens)} tokens`),
        card('Avg cost / essay', fmtUsd4(t.avgCostPerGrade), null, true),
        card('Active users', fmtNum(t.activeUsers)),
      ];
      $('cards').innerHTML = topCards.join('');
      $('cardsActivity').innerHTML = topCards.join('');
      $('cardsReliability').innerHTML = [
        card('Error rate', (t.errorRate * 100).toFixed(1) + '%', `${fmtNum(t.errors)} errors`),
        card('Errors', fmtNum(t.errors)),
        card('Avg latency', t.avgLatencyMs != null ? (t.avgLatencyMs/1000).toFixed(1)+'s' : '—'),
        card('Essays graded', fmtNum(t.grades)),
      ].join('');

      const max = Math.max(...d.overTime.map(x => x.grades), 1);
      $('overTime').innerHTML = d.overTime.length ? d.overTime.map(x => `
        <div class="bar-row">
          <div class="k">${esc(x.day.slice(5))}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(x.grades/max)*100}%"></div></div>
          <div class="v">${fmtNum(x.grades)} · ${fmtUsd(x.cost)}${x.errors?` · <span style="color:var(--bad)">${x.errors} err</span>`:''}</div>
        </div>`).join('') : '<p class="muted" style="padding:0 16px">No data.</p>';

      $('modelsTable').innerHTML = d.models.length ? `<table><thead><tr><th>Model</th><th class="num">Essays</th><th class="num">Tokens</th><th class="num">Cost</th></tr></thead><tbody>${d.models.map(m=>`<tr><td>${esc(m.model)}</td><td class="num">${fmtNum(m.grades)}</td><td class="num">${fmtNum(m.tokens)}</td><td class="num">${fmtUsd(m.cost)}</td></tr>`).join('')}</tbody></table>` : '<p class="muted" style="padding:0 16px">No data.</p>';

      $('errorsTable').innerHTML = d.recentErrors.length ? `<table><thead><tr><th>When</th><th>User</th><th>Action</th><th>Error</th></tr></thead><tbody>${d.recentErrors.map(e=>`<tr><td class="muted">${fmtDateTime(e.createdAt)}</td><td>${esc(e.user)}</td><td>${esc(e.action)}</td><td class="err-msg">${esc(e.errorMessage)}</td></tr>`).join('')}</tbody></table>` : '<p class="muted" style="padding:0 16px">No errors 🎉</p>';

      $('status').textContent = 'Updated ' + new Date().toLocaleTimeString();
    }

    // ---------- Users list ----------
    async function loadUsers() {
      const r = await fetch('/admin/api/users');
      if (r.status === 401) { showLogin(); return; }
      const d = await r.json();
      if (!d.success) { $('userList').innerHTML = '<div class="detail-empty">Error loading users.</div>'; return; }

      $('userList').innerHTML = d.users.map(u => {
        return `<div class="user-row${u.id===selectedUserId?' selected':''}" data-id="${esc(u.id)}">
          <div style="min-width:0">
            <div class="name-line"><span class="num">#${u.num}</span> <span class="name">${esc(nameFromEmail(u.email))}</span> ${badges(u)}</div>
            <div class="email">${esc(u.email)}</div>
            <div class="meta">
              <span>${fmtNum(u.essays)} essays</span><span class="dot">·</span>
              <span>joined ${fmtDate(u.signupDate)}</span><span class="dot">·</span>
              <span>active ${ago(u.lastActiveDaysAgo)}</span>
            </div>
          </div>
          <div class="cost">${fmtUsd(u.cost)}</div>
        </div>`;
      }).join('') || '<div class="detail-empty">No users.</div>';

      document.querySelectorAll('.user-row').forEach(row =>
        row.addEventListener('click', () => selectUser(row.dataset.id)));
    }

    async function selectUser(id) {
      selectedUserId = id;
      document.querySelectorAll('.user-row').forEach(r => r.classList.toggle('selected', r.dataset.id === id));
      $('userDetail').innerHTML = '<div class="detail-empty">Loading…</div>';
      const r = await fetch('/admin/api/users/' + encodeURIComponent(id));
      if (r.status === 401) { showLogin(); return; }
      const d = await r.json();
      if (!d.success) { $('userDetail').innerHTML = '<div class="detail-empty">Error.</div>'; return; }
      renderUserDetail(d);
    }

    function renderUserDetail(d) {
      const c = d.cost, rec = d.recency;
      const cyclesHtml = d.cycles.length ? d.cycles.map(cy => `
        <div class="cycle">
          <span class="when">${fmtDate(cy.start)}${cy.spanDays>1?` – ${fmtDate(cy.end)}`:''}</span>
          <span class="n">${fmtNum(cy.essays)} essay${cy.essays===1?'':'s'} · ${cy.spanDays}d</span>
        </div>`).join('') : '<p class="muted">No grading activity yet.</p>';

      $('userDetail').innerHTML = `<div class="detail-body">
        <h4>${esc(nameFromEmail(d.user.email))} ${badges({ status: rec.status, role: d.user.role, campus: d.user.campus })}</h4>
        <div class="detail-sub">${esc(d.user.email)} · joined ${fmtDate(d.user.signupDate)}</div>

        <div class="section-label">Cost breakdown</div>
        <div class="stat-grid">
          <div class="stat"><div class="n">${fmtNum(c.essays)}</div><div class="l">Essays graded</div></div>
          <div class="stat"><div class="n accent">${fmtUsd4(c.avgPerEssay)}</div><div class="l">Avg / essay</div></div>
          <div class="stat"><div class="n">${fmtUsd(c.total)}</div><div class="l">Total cost</div></div>
        </div>

        <div class="section-label">Engagement</div>
        <div class="stat-grid">
          <div class="stat"><div class="n">${d.cycleCount}</div><div class="l">Grading cycles</div></div>
          <div class="stat"><div class="n">${ago(rec.lastActiveDaysAgo)}</div><div class="l">Last active</div></div>
          <div class="stat"><div class="n">${c.errors?fmtNum(c.errors):'0'}</div><div class="l">Errors</div></div>
        </div>

        <div class="section-label">Grading cycles <span class="muted" style="text-transform:none">(1–3 day bursts)</span></div>
        ${cyclesHtml}
      </div>`;
    }

    // ---------- Tab switching ----------
    document.querySelectorAll('nav.tabs button').forEach(btn =>
      btn.addEventListener('click', () => {
        document.querySelectorAll('nav.tabs button').forEach(b => b.classList.toggle('active', b === btn));
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
      }));

    async function loadAll() {
      $('status').textContent = 'Loading…';
      currentDays = parseInt($('range').value, 10);
      await Promise.all([loadSummary(), loadUsers()]);
    }

    $('loginBtn').addEventListener('click', doLogin);
    $('secret').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    $('logout').addEventListener('click', doLogout);
    $('refresh').addEventListener('click', loadAll);
    $('range').addEventListener('change', loadAll);

    (async () => {
      const authed = await whoami();
      if (authed === null) return;
      authed ? showDashboard() : showLogin();
    })();
  </script>
</body>
</html>
